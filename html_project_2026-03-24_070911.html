<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Script Tester</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .status-box { padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }
        #msg { font-weight: bold; font-size: 1.2rem; }
        .loading { background-color: #eee; color: #666; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <h2>Ad Script Connection Test</h2>
    
    <div id="status-container" class="status-box loading">
        <p id="msg">Checking Script Status...</p>
    </div>

    <script id="testAd" src="https://pl28680130.effectivegatecpm.com/29/15/e7/2915e7e1568bba4d20a98c23860cd515.js"></script>

    <script>
        const scriptTag = document.getElementById('testAd');
        const statusBox = document.getElementById('status-container');
        const message = document.getElementById('msg');

        // Agar script load ho gayi
        scriptTag.onload = function() {
            statusBox.className = "status-box success";
            message.innerText = "✅ Script Working: File successfully load ho gayi hai.";
        };

        // Agar script block ho gayi ya link dead hai
        scriptTag.onerror = function() {
            statusBox.className = "status-box error";
            message.innerText = "❌ Script Failed: Link dead hai ya Ad-blocker ne rok diya hai.";
        };
    </script>

</body>
</html>
